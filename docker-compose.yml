services:
  postgres:
    # Use pgvector/pgvector image for vector support (required for knowledge/RAG)
    # Neon and Supabase have pgvector pre-installed in production
    image: pgvector/pgvector:pg16
    container_name: aelokit-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: aelokit
      POSTGRES_PASSWORD: aelokit123
      POSTGRES_DB: aelokit
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
