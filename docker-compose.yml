services:
  postgres:
    image: postgres:16-alpine
    container_name: aelokit-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: aelokit
      POSTGRES_PASSWORD: aelokit123
      POSTGRES_DB: aelokit
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
